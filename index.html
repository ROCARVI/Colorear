<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coloreando con ProfeRoy Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Quicksand', sans-serif;
            background-color: #f0f9ff;
            overflow: hidden;
            user-select: none;
            touch-action: none;
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        .color-dot {
            width: 48px;
            height: 48px;
            border-radius: 14px;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 3px solid white;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        .color-dot.active {
            border-color: #333;
            transform: scale(1.1);
            box-shadow: 0 0 0 4px #fff, 0 0 0 6px #333;
        }
        
        .canvas-container {
            background: white;
            border-radius: 30px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.08);
            position: relative;
            cursor: crosshair;
            border: 8px solid #e0f2fe;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            width: 100%;
            height: 100%;
        }

        canvas {
            max-width: 98%;
            max-height: 98%;
            image-rendering: pixelated;
        }
        
        .btn-side {
            transition: all 0.2s;
            display: flex;
            flex-direction: row;
            align-items: center;
            justify-content: center;
            gap: 12px;
            width: 100%;
            padding: 16px 20px;
            border-radius: 20px;
            font-weight: 800;
            text-transform: uppercase;
            font-size: 0.9rem;
            letter-spacing: 0.05em;
        }
        .btn-save { background-color: #10b981; color: white; box-shadow: 0 6px 0 #065f46; }
        .btn-save:active { transform: translateY(4px); box-shadow: 0 2px 0 #065f46; }
        
        .btn-clear { background-color: #e2e8f0; color: #475569; box-shadow: 0 6px 0 #94a3b8; }
        .btn-clear:active { transform: translateY(4px); box-shadow: 0 2px 0 #94a3b8; }

        .nav-btn {
            background: white;
            border: 3px solid #e0f2fe;
            padding: 8px 18px;
            border-radius: 15px;
            font-weight: bold;
            transition: all 0.2s;
        }
        .nav-btn:hover { background: #f0f9ff; border-color: #bae6fd; }
    </style>
</head>
<body class="h-screen flex flex-col p-3 md:p-5">

    <header class="w-full flex justify-between items-center mb-4 px-2 h-14 shrink-0">
        <div class="flex items-center gap-2">
            <span class="text-4xl">🎨</span>
            <h1 class="text-2xl font-extrabold text-blue-600">ProfeRoy <span class="text-orange-500">PINTA</span></h1>
        </div>
        
        <div class="flex items-center gap-4 bg-white px-5 py-2 rounded-2xl shadow-sm border-2 border-blue-50">
            <button id="prevBtn" class="nav-btn text-xl">⬅</button>
            <span id="pageIndicator" class="text-blue-800 font-black min-w-[100px] text-center uppercase text-sm tracking-tighter">Dibujo 1 / 14</span>
            <button id="nextBtn" class="nav-btn text-xl">➡</button>
        </div>

        <div id="currentColorPreview" class="w-12 h-12 rounded-xl shadow-inner border-4 border-white" style="background-color: #FF0000;"></div>
    </header>

    <main class="flex-1 flex gap-5 overflow-hidden">
        
        <!-- Lateral Izquierdo: Paleta (Ensanchada 30%) -->
        <aside class="w-40 bg-white rounded-[32px] p-4 shadow-sm border-2 border-blue-50 flex flex-col items-center shrink-0">
            <span class="text-[10px] font-black text-blue-300 uppercase mb-4 tracking-widest">Paleta de Colores</span>
            <div id="palette" class="grid grid-cols-2 gap-4 overflow-y-auto no-scrollbar pb-4">
                <!-- Colores insertados por JS -->
            </div>
        </aside>

        <!-- Área Central: El Dibujo -->
        <section class="flex-1 canvas-container">
            <canvas id="mainCanvas"></canvas>
        </section>

        <!-- Lateral Derecho: Acciones (Más ancho para botones alargados) -->
        <aside class="w-44 flex flex-col gap-5 shrink-0">
            <button id="exportBtn" class="btn-side btn-save">
                <span class="text-2xl">💾</span>
                <span>Guardar</span>
            </button>
            
            <button id="clearBtn" class="btn-side btn-clear mt-auto">
                <span class="text-2xl">🧹</span>
                <span>Limpiar</span>
            </button>
        </aside>
    </main>

    <div id="toast" class="fixed top-10 left-1/2 -translate-x-1/2 bg-green-500 text-white px-8 py-4 rounded-2xl shadow-2xl opacity-0 transition-all pointer-events-none font-bold z-50">
        ✨ ¡Dibujo guardado con éxito!
    </div>

    <script>
        const colors = [
            { name: "Rojo", hex: "#FF0000" },
            { name: "Naranja", hex: "#FF8C00" },
            { name: "Amarillo Huevo", hex: "#FFB81C" },
            { name: "Amarillo Claro", hex: "#FFF3B0" },
            { name: "Verde Lima", hex: "#32CD32" },
            { name: "Verde Claro", hex: "#90EE90" },
            { name: "Verde Oscuro", hex: "#006400" },
            { name: "Turquesa", hex: "#40E0D0" },
            { name: "Menta", hex: "#98FB98" },
            { name: "Celeste", hex: "#87CEEB" },
            { name: "Azul Cielo", hex: "#00BFFF" },
            { name: "Azul Mar", hex: "#000080" },
            { name: "Púrpura", hex: "#800080" },
            { name: "Lila", hex: "#C8A2C8" },
            { name: "Fucsia", hex: "#FF00FF" },
            { name: "Rosado Claro", hex: "#FFB6C1" },
            { name: "Color Piel", hex: "#FFDBAC" },
            { name: "Gris", hex: "#808080" },
            { name: "Café", hex: "#8B4513" },
            { name: "Blanco Hueso", hex: "#F5F5DC" }
        ];

        const imageSources = Array.from({length: 14}, (_, i) => `${i + 1}.png`);
        let currentIndex = 0;
        let currentUint32 = 0xFF0000FF; 
        
        const canvas = document.getElementById('mainCanvas');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });
        const paletteEl = document.getElementById('palette');
        const colorPreview = document.getElementById('currentColorPreview');

        const MAX_STACK = 1024 * 1024;
        const stack = new Int32Array(MAX_STACK);

        function hexToUint32(hex) {
            const r = parseInt(hex.slice(1, 3), 16);
            const g = parseInt(hex.slice(3, 5), 16);
            const b = parseInt(hex.slice(5, 7), 16);
            // Formato ABGR (Little Endian para canvas)
            return (255 << 24) | (b << 16) | (g << 8) | r;
        }

        function initPalette() {
            paletteEl.innerHTML = '';
            colors.forEach((colorObj, index) => {
                const dot = document.createElement('div');
                dot.className = `color-dot ${index === 0 ? 'active' : ''}`;
                dot.style.backgroundColor = colorObj.hex;
                dot.title = colorObj.name;
                dot.onclick = () => {
                    currentUint32 = hexToUint32(colorObj.hex);
                    colorPreview.style.backgroundColor = colorObj.hex;
                    document.querySelectorAll('.color-dot').forEach(d => d.classList.remove('active'));
                    dot.classList.add('active');
                };
                paletteEl.appendChild(dot);
            });
            currentUint32 = hexToUint32(colors[0].hex);
        }

        function loadImage(index) {
            const img = new Image();
            img.src = imageSources[index];
            img.crossOrigin = "Anonymous";
            
            img.onload = () => {
                canvas.width = 1000;
                canvas.height = 1000;
                ctx.fillStyle = "white";
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                
                const scale = Math.min(canvas.width / img.width, canvas.height / img.height);
                const x = (canvas.width / 2) - (img.width / 2) * scale;
                const y = (canvas.height / 2) - (img.height / 2) * scale;
                
                ctx.imageSmoothingEnabled = false;
                ctx.drawImage(img, x, y, img.width * scale, img.height * scale);
                document.getElementById('pageIndicator').innerText = `Dibujo ${currentIndex + 1} / ${imageSources.length}`;
            };
        }

        function floodFill(startX, startY, fillCol) {
            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const pixels = new Uint32Array(imageData.data.buffer);
            const width = canvas.width;
            const height = canvas.height;

            const startPos = startY * width + startX;
            const targetColor = pixels[startPos];

            // Si es el mismo color o es negro sólido (línea), abortar
            if (targetColor === fillCol) return;
            
            const tr = targetColor & 0xff, tg = (targetColor >> 8) & 0xff, tb = (targetColor >> 16) & 0xff;
            // Detección de líneas negras (umbral estricto para evitar pintar sobre bordes)
            if (tr < 70 && tg < 70 && tb < 70) return;

            let stackPtr = 0;
            stack[stackPtr++] = startPos;

            const tolerance = 75;

            function matches(p) {
                const c = pixels[p];
                const r = c & 0xff, g = (c >> 8) & 0xff, b = (c >> 16) & 0xff;
                return Math.abs(r - tr) < tolerance && 
                       Math.abs(g - tg) < tolerance && 
                       Math.abs(b - tb) < tolerance;
            }

            while (stackPtr > 0) {
                const pos = stack[--stackPtr];
                const x = pos % width;
                const y = (pos / width) | 0;

                if (matches(pos)) {
                    pixels[pos] = fillCol;

                    if (x > 0 && matches(pos - 1)) {
                        pixels[pos - 1] = fillCol; 
                        stack[stackPtr++] = pos - 1;
                    }
                    if (x < width - 1 && matches(pos + 1)) {
                        pixels[pos + 1] = fillCol;
                        stack[stackPtr++] = pos + 1;
                    }
                    if (y > 0 && matches(pos - width)) {
                        pixels[pos - width] = fillCol;
                        stack[stackPtr++] = pos - width;
                    }
                    if (y < height - 1 && matches(pos + width)) {
                        pixels[pos + width] = fillCol;
                        stack[stackPtr++] = pos + width;
                    }
                }
                if (stackPtr > MAX_STACK - 5) break;
            }
            ctx.putImageData(imageData, 0, 0);
        }

        const handleInput = (e) => {
            const rect = canvas.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            const x = Math.floor((clientX - rect.left) * scaleX);
            const y = Math.floor((clientY - rect.top) * scaleY);

            if (x >= 0 && x < canvas.width && y >= 0 && y < canvas.height) {
                floodFill(x, y, currentUint32);
            }
        };

        canvas.addEventListener('mousedown', handleInput);
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            handleInput(e);
        }, { passive: false });

        document.getElementById('prevBtn').onclick = () => {
            currentIndex = (currentIndex - 1 + imageSources.length) % imageSources.length;
            loadImage(currentIndex);
        };

        document.getElementById('nextBtn').onclick = () => {
            currentIndex = (currentIndex + 1) % imageSources.length;
            loadImage(currentIndex);
        };

        document.getElementById('clearBtn').onclick = () => loadImage(currentIndex);

        document.getElementById('exportBtn').onclick = () => {
            const link = document.createElement('a');
            link.download = `proferoy_dibujo_${Date.now()}.png`;
            link.href = canvas.toDataURL("image/png");
            link.click();
            
            const toast = document.getElementById('toast');
            toast.style.opacity = "1";
            setTimeout(() => toast.style.opacity = "0", 3000);
        };

        window.onload = () => {
            initPalette();
            loadImage(0);
        };
    </script>
</body>
</html>
