<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coloreando con ProfeRoy Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Quicksand', sans-serif;
            background-color: #f0f9ff;
            overflow: hidden; /* Evita scroll en la laptop */
            user-select: none;
            touch-action: none;
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        .sidebar-palette {
            width: 175px; /* Ensanchado un 30% más */
            flex-shrink: 0;
        }

        .color-dot {
            width: 52px;
            height: 52px;
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 3px solid white;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        .color-dot.active {
            border-color: #333;
            transform: scale(1.1);
            box-shadow: 0 0 0 4px #fff, 0 0 0 6px #333;
        }
        
        .canvas-container {
            background: white;
            border-radius: 30px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.08);
            position: relative;
            cursor: crosshair;
            border: 8px solid #e0f2fe;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            width: 100%;
            height: 100%;
        }

        canvas {
            max-width: 98%;
            max-height: 98%;
            image-rendering: pixelated; /* Elimina grises fantasma en los bordes */
            display: block;
        }
        
        .btn-side {
            transition: all 0.2s;
            display: flex;
            flex-direction: row;
            align-items: center;
            justify-content: center;
            gap: 12px;
            width: 100%;
            padding: 18px 10px;
            border-radius: 20px;
            font-weight: 800;
            text-transform: uppercase;
            font-size: 0.9rem;
            letter-spacing: 0.05em;
        }
        .btn-save { background-color: #10b981; color: white; box-shadow: 0 6px 0 #065f46; }
        .btn-save:active { transform: translateY(4px); box-shadow: 0 2px 0 #065f46; }
        
        .btn-clear { background-color: #e2e8f0; color: #475569; box-shadow: 0 6px 0 #94a3b8; }
        .btn-clear:active { transform: translateY(4px); box-shadow: 0 2px 0 #94a3b8; }

        .nav-btn {
            background: #3b82f6; /* bg-blue-500 */
            color: white;
            border: none;
            padding: 10px 32px; /* Más alargados horizontalmente */
            border-radius: 12px;
            font-weight: bold;
            transition: all 0.2s;
            box-shadow: 0 4px 0 #2563eb; /* Sombra azul más oscuro */
        }
        .nav-btn:hover { 
            background: #2563eb; /* bg-blue-600 */
        }
        .nav-btn:active {
            transform: translateY(4px);
            box-shadow: 0 0 0 #2563eb;
        }
    </style>
</head>
<body class="h-screen flex flex-col p-3 md:p-5">

    <header class="w-full flex justify-between items-center mb-4 px-2 h-14 shrink-0">
        <div class="flex items-center gap-2">
            <span class="text-4xl">🎨</span>
            <h1 class="text-2xl font-extrabold text-blue-600">ProfeRoy <span class="text-orange-500">PINTA</span></h1>
        </div>
        
        <div class="flex items-center gap-4 bg-white px-4 py-2 rounded-2xl shadow-sm border-2 border-blue-50">
            <button id="prevBtn" class="nav-btn text-2xl">⬅</button>
            <span id="pageIndicator" class="text-blue-800 font-black min-w-[120px] text-center uppercase text-sm tracking-tighter">Dibujo 1 / 14</span>
            <button id="nextBtn" class="nav-btn text-2xl">➡</button>
        </div>

        <!-- Muestra el color seleccionado -->
        <div id="currentColorPreview" class="w-14 h-14 rounded-2xl shadow-inner border-4 border-white" style="background-color: #FF0000;"></div>
    </header>

    <main class="flex-1 flex gap-5 overflow-hidden">
        
        <!-- PALETA IZQUIERDA (Ajuste 14" y 2 Columnas) -->
        <aside class="sidebar-palette bg-white rounded-[40px] p-5 shadow-sm border-2 border-blue-50 flex flex-col items-center shrink-0">
            <span class="text-[10px] font-black text-blue-300 uppercase mb-4 tracking-widest">Colores</span>
            <div id="palette" class="grid grid-cols-2 gap-4 overflow-y-auto no-scrollbar pb-4">
                <!-- Los colores se inyectan aquí con JS -->
            </div>
        </aside>

        <!-- ÁREA CENTRAL (Dibujo máximo espacio) -->
        <section class="flex-1 canvas-container">
            <canvas id="mainCanvas"></canvas>
        </section>

        <!-- PANELES DERECHOS (Botones Rectangulares alargados) -->
        <aside class="w-52 flex flex-col gap-6 shrink-0">
            <div class="bg-white p-4 rounded-[30px] border-2 border-blue-50 shadow-sm flex flex-col gap-4">
                <button id="exportBtn" class="btn-side btn-save">
                    <span class="text-2xl">💾</span>
                    <span>Guardar</span>
                </button>
                
                <button id="clearBtn" class="btn-side btn-clear">
                    <span class="text-2xl">🧹</span>
                    <span>Limpiar</span>
                </button>
            </div>
            
            <div class="mt-auto p-4 text-center bg-blue-50 rounded-2xl">
                <p class="text-[10px] font-bold text-blue-400 uppercase leading-tight">Haz clic en una zona blanca para pintar</p>
            </div>
        </aside>
    </main>

    <!-- Mensaje Flotante de Guardado -->
    <div id="toast" class="fixed top-10 left-1/2 -translate-x-1/2 bg-green-500 text-white px-8 py-4 rounded-2xl shadow-2xl opacity-0 transition-all pointer-events-none font-bold z-50">
        ✨ ¡Dibujo guardado con éxito!
    </div>

    <script>
        // La lista exacta de 20 colores solicitada
        const colors = [
            { name: "Rojo", hex: "#FF0000" },
            { name: "Naranja", hex: "#FF8C00" },
            { name: "Amarillo Huevo", hex: "#FFD700" },
            { name: "Amarillo Claro", hex: "#FFFFE0" },
            { name: "Verde Lima", hex: "#32CD32" },
            { name: "Verde Claro", hex: "#90EE90" },
            { name: "Verde Oscuro", hex: "#006400" },
            { name: "Turquesa", hex: "#40E0D0" },
            { name: "Menta", hex: "#98FB98" },
            { name: "Celeste", hex: "#ADD8E6" },
            { name: "Azul Cielo", hex: "#87CEEB" },
            { name: "Azul Mar", hex: "#000080" },
            { name: "Púrpura", hex: "#800080" },
            { name: "Lila", hex: "#C8A2C8" },
            { name: "Fucsia", hex: "#FF00FF" },
            { name: "Rosado Claro", hex: "#FFB6C1" },
            { name: "Color Piel", hex: "#FFDBAC" },
            { name: "Gris", hex: "#808080" },
            { name: "Café", hex: "#8B4513" },
            { name: "Blanco Hueso", hex: "#F5F5DC" }
        ];

        const imageSources = Array.from({length: 14}, (_, i) => `${i + 1}.png`);
        let currentIndex = 0;
        let currentUint32 = 0xFF0000FF; 
        
        const canvas = document.getElementById('mainCanvas');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });
        const paletteEl = document.getElementById('palette');
        const colorPreview = document.getElementById('currentColorPreview');

        // Convertidor seguro a 32 bits enteros (Evita bugs de color)
        function hexToUint32(hex) {
            const r = parseInt(hex.slice(1, 3), 16);
            const g = parseInt(hex.slice(3, 5), 16);
            const b = parseInt(hex.slice(5, 7), 16);
            // Formato ABGR para Canvas. El '>>> 0' fuerza que sea positivo sin signo
            return ((255 << 24) | (b << 16) | (g << 8) | r) >>> 0;
        }

        function initPalette() {
            paletteEl.innerHTML = '';
            colors.forEach((colorObj, index) => {
                const dot = document.createElement('div');
                dot.className = `color-dot ${index === 0 ? 'active' : ''}`;
                dot.style.backgroundColor = colorObj.hex;
                dot.title = colorObj.name; // Tooltip con el nombre
                dot.onclick = () => {
                    currentUint32 = hexToUint32(colorObj.hex);
                    colorPreview.style.backgroundColor = colorObj.hex;
                    document.querySelectorAll('.color-dot').forEach(d => d.classList.remove('active'));
                    dot.classList.add('active');
                };
                paletteEl.appendChild(dot);
            });
            currentUint32 = hexToUint32(colors[0].hex);
        }

        function loadImage(index) {
            const img = new Image();
            img.crossOrigin = "anonymous"; // CRUCIAL para GitHub Pages (CORS)
            img.src = imageSources[index];
            
            img.onload = () => {
                // Resolución interna alta y cuadrada
                canvas.width = 1000;
                canvas.height = 1000;
                ctx.fillStyle = "white";
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                
                const scale = Math.min(canvas.width / img.width, canvas.height / img.height);
                const x = (canvas.width / 2) - (img.width / 2) * scale;
                const y = (canvas.height / 2) - (img.height / 2) * scale;
                
                ctx.imageSmoothingEnabled = false;
                ctx.drawImage(img, x, y, img.width * scale, img.height * scale);
                document.getElementById('pageIndicator').innerText = `Dibujo ${currentIndex + 1} / ${imageSources.length}`;
            };
        }

        function floodFill(startX, startY, fillCol) {
            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const pixels = new Uint32Array(imageData.data.buffer);
            const width = canvas.width;
            const height = canvas.height;

            const startPos = startY * width + startX;
            const targetColor = pixels[startPos];

            // 1. Si ya es del mismo color exacto, salimos.
            if (targetColor === fillCol) return;
            
            // 2. Extracción segura de RGB del color objetivo (donde hicimos clic)
            const tr = targetColor & 0xff, tg = (targetColor >> 8) & 0xff, tb = (targetColor >> 16) & 0xff;
            
            // 3. No pintar si dimos clic en una línea negra o gris muy oscura
            if (tr < 85 && tg < 85 && tb < 85) return;

            // Tolerancia aumentada para esquivar el anti-aliasing
            const tolerance = 70;

            // FUNCIÓN CRÍTICA DE COMPARACIÓN
            function isMatch(pos) {
                const c = pixels[pos];
                // ¡LA SOLUCIÓN AL BUCLE INFINITO! Si el píxel ya fue pintado por nosotros, ignorarlo.
                if (c === fillCol) return false; 
                
                const r = c & 0xff, g = (c >> 8) & 0xff, b = (c >> 16) & 0xff;
                return Math.abs(r - tr) < tolerance && 
                       Math.abs(g - tg) < tolerance && 
                       Math.abs(b - tb) < tolerance;
            }

            // Algoritmo de "Scanline" (El más estable, no usa recursividad, no cuelga la RAM)
            const stack = [];
            stack.push(startX, startY);

            while (stack.length > 0) {
                let y = stack.pop();
                let x = stack.pop();
                let pos = y * width + x;
                
                // Subir hasta la línea negra
                while (y >= 0 && isMatch(pos)) {
                    y--;
                    pos -= width;
                }
                pos += width;
                y++;

                let spanLeft = false;
                let spanRight = false;

                // Pintar la línea horizontalmente bajando
                while (y < height && isMatch(pos)) {
                    pixels[pos] = fillCol;

                    if (x > 0) {
                        if (isMatch(pos - 1)) {
                            if (!spanLeft) { stack.push(x - 1, y); spanLeft = true; }
                        } else if (spanLeft) { spanLeft = false; }
                    }

                    if (x < width - 1) {
                        if (isMatch(pos + 1)) {
                            if (!spanRight) { stack.push(x + 1, y); spanRight = true; }
                        } else if (spanRight) { spanRight = false; }
                    }

                    y++;
                    pos += width;
                }
            }
            ctx.putImageData(imageData, 0, 0);
        }

        const handleInput = (e) => {
            // El rect calcula exactamente dónde está posicionado y deformado el canvas en pantalla
            const rect = canvas.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            
            // Transformar la posición del ratón al pixel exacto interno (resolución 1000x1000)
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            
            const x = Math.floor((clientX - rect.left) * scaleX);
            const y = Math.floor((clientY - rect.top) * scaleY);

            if (x >= 0 && x < canvas.width && y >= 0 && y < canvas.height) {
                floodFill(x, y, currentUint32);
            }
        };

        canvas.addEventListener('mousedown', handleInput);
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault(); 
            handleInput(e);
        }, { passive: false });

        document.getElementById('prevBtn').onclick = () => {
            currentIndex = (currentIndex - 1 + imageSources.length) % imageSources.length;
            loadImage(currentIndex);
        };

        document.getElementById('nextBtn').onclick = () => {
            currentIndex = (currentIndex + 1) % imageSources.length;
            loadImage(currentIndex);
        };

        document.getElementById('clearBtn').onclick = () => loadImage(currentIndex);

        document.getElementById('exportBtn').onclick = () => {
            const link = document.createElement('a');
            link.download = `dibujo_proferoy_${Date.now()}.png`;
            link.href = canvas.toDataURL("image/png");
            link.click();
            
            // Mostrar Toast temporal
            const toast = document.getElementById('toast');
            toast.style.opacity = "1";
            setTimeout(() => toast.style.opacity = "0", 3000);
        };

        window.onload = () => {
            initPalette();
            loadImage(0);
        };
    </script>
</body>
</html>
